name: Monthly ETF Financial Crawl

on:
  schedule:
    - cron: '0 1 1 * *'   # 每月1日 09:00 UTC+8 = 01:00 UTC
  workflow_dispatch:        # 可手動觸發

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install yfinance

      - name: Run monthly crawl
        run: python cron_crawler.py
        env:
          TWSE_DATA_DIR: ${{ github.workspace }}/data
        working-directory: ${{ github.workspace }}

      - name: Build dashboard
        run: |
          python build_dashboard.py
          python build_kline.py
        env:
          TWSE_DATA_DIR: ${{ github.workspace }}/data
          TWSE_OUTPUT_FILE: ${{ github.workspace }}/dashboard.html
        working-directory: ${{ github.workspace }}

      - name: Commit & push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.html data/*/meta.json data/kline_data.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: monthly ETF financial crawl $(date +'%Y-%m-%d')

author: hermes-agent-deepseek-v4-flash"
            git push
          fi
